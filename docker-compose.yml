services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sistema_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sistema_network

  nginx:
    image: nginx:stable-alpine
    container_name: sistema_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - sistema_network

  mysql:
    image: mysql:8.4
    container_name: sistema_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sistema_academico
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - sistema_network

volumes:
  mysql_data:
  backend_vendor:

networks:
  sistema_network:
    driver: bridge
